# ═════════════════════════════════════════════════════════════════════════════
# NGINX Configuration — Production Ready
# Setup: Reverse Proxy + Load Balancing + Caching + Rate Limiting
# ═════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# MAIN CONTEXT
# ───────────────────────────────────────────────────────────────────────────

worker_processes auto;                    # Gunakan semua CPU core
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;              # Max koneksi per worker
    use epoll;                            # Event model Linux (paling efisien)
    multi_accept on;                      # Accept multiple koneksi sekaligus
}

# ───────────────────────────────────────────────────────────────────────────
# HTTP CONTEXT
# ───────────────────────────────────────────────────────────────────────────

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────────────────────────────
    # LOGGING FORMAT
    # ──────────────────────────────────────────────────────────────────────
    
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream: $upstream_addr '
                    'cache: $upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # ──────────────────────────────────────────────────────────────────────
    # BASIC PERFORMANCE
    # ──────────────────────────────────────────────────────────────────────
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;                    # Sembunyikan versi NGINX

    # ──────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ──────────────────────────────────────────────────────────────────────
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain 
               text/css 
               application/json 
               application/javascript 
               text/xml 
               application/xml 
               image/svg+xml;
    gzip_comp_level 5;

    # ──────────────────────────────────────────────────────────────────────
    # PROXY CACHE CONFIGURATION
    # ──────────────────────────────────────────────────────────────────────
    
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=app_cache:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ──────────────────────────────────────────────────────────────────────
    # RATE LIMITING
    # ──────────────────────────────────────────────────────────────────────
    
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ──────────────────────────────────────────────────────────────────────
    # UPSTREAM - LOAD BALANCING CLUSTER
    # ──────────────────────────────────────────────────────────────────────
    
    upstream backend_cluster {
        
        # Load balancing method: least_conn (recommended)
        least_conn;
        
        # Backend servers dengan weight
        server app1:8081 weight=3;
        server app2:8081 weight=2;
        server app3:8081 weight=1 backup;
        
        # Keep-alive connections ke upstream
        keepalive 32;
    }

    # ──────────────────────────────────────────────────────────────────────
    # SERVER BLOCK - MAIN WEB SERVER
    # ──────────────────────────────────────────────────────────────────────
    
    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Rate Limiting Global
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: STATIC FILES
        # ──────────────────────────────────────────────────────────────────
        
        location /static/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: API - REVERSE PROXY + CACHE + LOAD BALANCING
        # ──────────────────────────────────────────────────────────────────
        
        location /api/ {

            # ───── CACHE CONFIGURATION ─────

            proxy_cache app_cache;
            proxy_cache_key "$request_method$request_uri";
            proxy_cache_valid 200 302  10m;
            proxy_cache_valid 404      1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;

            # ───── REVERSE PROXY SETTINGS ─────

            proxy_pass http://backend_cluster;

            # ───── HEADER FORWARDING ─────

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ───── TIMEOUT SETTINGS ─────

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # ───── BUFFERING SETTINGS ─────

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;

            # ───── REWRITE RULES ─────

            rewrite ^/api/(.*) /$1 break;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: HEALTH CHECK
        # ──────────────────────────────────────────────────────────────────
        
        location /health {
            access_log off;
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────────────────────────
        # LOCATION: NGINX STATUS (MONITORING)
        # ──────────────────────────────────────────────────────────────────
        
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # ──────────────────────────────────────────────────────────────────
        # ERROR PAGES
        # ──────────────────────────────────────────────────────────────────
        
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
