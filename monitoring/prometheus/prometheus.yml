global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "todolist-api-prod"
    # Actuator prod berjalan di port 8082 (management.server.port=8082)
    # dengan base path /internal/actuator (bukan /actuator default)
    metrics_path: "/internal/actuator/prometheus"
    static_configs:
      - targets: ["spring_app:8082"]
    scrape_interval: 10s
    scrape_timeout: 5s
