# ===============================
# DATASOURCE - PROD
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA - PROD
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ===============================
# REDIS - PROD
# ===============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ===============================
# ACTUATOR - PROD
# Arsitektur dua port:
#   Port 8080 (app)  → /actuator/health (permitAll, untuk Docker healthcheck)
#   Port 8082 (mgmt) → /internal/actuator/prometheus (untuk Prometheus scrape)
#
# Kenapa health check di port 8080?
#   Docker healthcheck wget dari dalam container = 127.0.0.1
#   Port 8080 sudah permitAll untuk /actuator/health di SecurityConfig
#   Lebih simple, tidak bergantung pada management security chain
# ===============================

# Port management terpisah — khusus untuk Prometheus scrape
management.server.port=8082

# Base path port 8082 di-rename untuk security by obscurity
# URL Prometheus: http://spring_app:8082/internal/actuator/prometheus
management.endpoints.web.base-path=/internal/actuator

# Hanya expose endpoint yang dibutuhkan
management.endpoints.web.exposure.include=health,prometheus,info,metrics

# Jangan tampilkan detail health ke publik
management.endpoint.health.show-details=never

# Prometheus endpoint wajib aktif di prod
management.endpoint.prometheus.enabled=true

# Matikan endpoint berbahaya
management.endpoint.shutdown.enabled=false
management.endpoint.env.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.threaddump.enabled=false

# Metrics histogram P95/P99
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# SLO boundary
management.metrics.distribution.slo.http.server.requests=200ms,1s

# Tag tambahan
management.metrics.tags.environment=production

# ===============================
# LOGGING - PROD
# ===============================
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.mohammadnuridin.todolist=INFO

# ===============================
# JWT - PROD
# ===============================
app.jwt.secret-key=${JWT_SECRET_KEY}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ===============================
# SECURITY HEADERS - PROD
# ===============================
app.security.headers.hsts-enabled=true
app.security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'

# ===============================
# RATE LIMITER - PROD
# ===============================
app.rate-limiter.capacity=30
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=5
app.rate-limiter.auth.refill-duration-seconds=60

# ===============================
# FLYWAY - PROD
# ===============================
spring.flyway.enabled=true
spring.flyway.clean-disabled=true