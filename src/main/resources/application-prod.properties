# ===============================
# DATASOURCE - PROD
# Semua nilai wajib dari environment variable — tidak boleh hardcode
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA - PROD
# validate: Hibernate hanya validasi schema, tidak pernah ubah struktur DB
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===============================
# REDIS - PROD
# ===============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ===============================
# ACTUATOR - PROD
# Keamanan ketat — hanya expose endpoint yang benar-benar dibutuhkan
# Port terpisah agar tidak bisa diakses dari public internet
# Pastikan port 8082 hanya accessible dari internal network / VPN / monitoring agent
# ===============================

# Port terpisah dari app port (8081) — firewall rule: block 8082 dari publik
management.server.port=8082

# Base path di-rename agar tidak mudah ditebak (security by obscurity, defense-in-depth)
management.endpoints.web.base-path=/internal/actuator

# Hanya expose endpoint yang dibutuhkan monitoring agent (Prometheus, health check)
# - health   : untuk load balancer health check & uptime monitor
# - prometheus: untuk Prometheus scraping (metric time-series)
# - info     : versi app untuk deployment tracking
# - metrics  : fallback jika tidak pakai Prometheus
management.endpoints.web.exposure.include=health,prometheus,info,metrics

# Jangan pernah tampilkan detail health ke publik (bisa bocorkan info DB, Redis, dll.)
management.endpoint.health.show-details=never

# Prometheus endpoint wajib aktif di prod
management.endpoint.prometheus.enabled=true

# Matikan endpoint berbahaya secara eksplisit (defense-in-depth)
management.endpoint.shutdown.enabled=false
management.endpoint.env.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.threaddump.enabled=false

# Metrics: aktifkan histogram P95/P99 untuk SLO monitoring di Grafana
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# SLO boundary — request dianggap lambat jika > 200ms atau > 1s (alert di Grafana)
management.metrics.distribution.slo.http.server.requests=200ms,1s

# Tag tambahan untuk membedakan instance di multi-instance deployment
management.metrics.tags.environment=production

# ===============================
# LOGGING - PROD
# WARN untuk root, INFO untuk app sendiri — hindari log sensitif
# ===============================
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.mohammadnuridin.todolist=INFO

# ===============================
# JWT - PROD
# Secret wajib dari environment variable
# ===============================
app.jwt.secret-key=${JWT_SECRET_KEY}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ===============================
# SECURITY HEADERS - PROD
# HSTS aktif di prod karena sudah pakai HTTPS
# ===============================
app.security.headers.hsts-enabled=true
app.security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'

# ===============================
# RATE LIMITER - PROD
# Lebih ketat dari dev untuk mengurangi beban dan abuse
# ===============================
app.rate-limiter.capacity=30
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=5
app.rate-limiter.auth.refill-duration-seconds=60