# ===============================
# ACTUATOR - DEV
# Semua endpoint terbuka — mudahkan debugging lokal
# PERINGATAN: jangan deploy config ini ke production
#
# URL akses (tanpa /api prefix karena Actuator bypass context-path):
#   http://localhost:8081/actuator/prometheus
#   http://localhost:8081/actuator/health
#   http://localhost:8081/actuator/metrics
# ===============================

# Buka semua endpoint actuator di dev
management.endpoints.web.exposure.include=*

# Tampilkan detail health lengkap (DB status, cache, disk space, dll.)
management.endpoint.health.show-details=always

# Aktifkan endpoint shutdown (hanya dev — matikan app via POST /actuator/shutdown)
management.endpoint.shutdown.enabled=true

# Prometheus endpoint aktif di dev untuk coba scraping lokal
management.endpoint.prometheus.enabled=true

# Metrics: aktifkan histogram untuk analisis latency per endpoint
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# Loggers endpoint — bisa ubah log level tanpa restart via POST /actuator/loggers/{name}
management.endpoint.loggers.enabled=true

# Environment endpoint — expose semua property (hati-hati di prod!)
management.endpoint.env.enabled=true

# ===============================
# LOGGING - DEV
# ===============================
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.mohammadnuridin.todolist=DEBUG

