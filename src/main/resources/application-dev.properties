# ===============================
# DATASOURCE - DEV
# Tanpa Docker: mysql jalan di localhost:3307 (port host dari docker-compose mysql)
# Dengan Docker: gunakan DB_URL env, atau biarkan default ini untuk dev lokal
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3307/todolist_db
spring.datasource.username=root
spring.datasource.password=asdf;lkj
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA - DEV
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ===============================
# REDIS - DEV
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# ACTUATOR - DEV
# App berjalan di port 8080 (server.port=8080 di application.properties).
# Di docker-compose, host port 8081 → container port 8080, jadi:
#   Akses dari host: http://localhost:8081/actuator/health
#   Akses dalam container: http://localhost:8080/actuator/health
#
# Dev lokal (tanpa Docker): http://localhost:8080/actuator/health
# ===============================

# Buka semua endpoint actuator di dev
management.endpoints.web.exposure.include=*

# Tampilkan detail health lengkap (DB status, cache, disk space, dll.)
management.endpoint.health.show-details=always

# Aktifkan endpoint shutdown (hanya dev)
management.endpoint.shutdown.enabled=true

# Prometheus endpoint aktif di dev
management.endpoint.prometheus.enabled=true

# Metrics: aktifkan histogram untuk analisis latency per endpoint
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# Loggers endpoint
management.endpoint.loggers.enabled=true

# Environment endpoint
management.endpoint.env.enabled=true

# ===============================
# LOGGING - DEV
# ===============================
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.mohammadnuridin.todolist=DEBUG

# ===============================
# JWT - DEV
# ===============================
app.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=2592000000

# ===============================
# SECURITY HEADERS - DEV
# ===============================
app.security.headers.hsts-enabled=false
app.security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'

# ===============================
# RATE LIMITER - DEV
# ===============================
app.rate-limiter.capacity=60
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=10
app.rate-limiter.auth.refill-duration-seconds=60

# ===============================
# FLYWAY - DEV
# ===============================
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=false