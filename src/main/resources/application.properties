# ===============================
# APPLICATION
# ===============================
spring.application.name=todolist
server.servlet.context-path=/api
# Port 8080 — default untuk container Docker.
# Di luar Docker (dev lokal tanpa Docker) akses via http://localhost:8080/api
server.port=8080
# spring.profiles.active TIDAK di-set di sini!
# Jika di-set di sini, nilai ini akan SELALU menang mengalahkan
# environment variable SPRING_PROFILES_ACTIVE dari Docker.
# Profile ditentukan dari luar:
#   Docker : SPRING_PROFILES_ACTIVE=prod  (di docker-compose.yaml)
#   Lokal  : mvn spring-boot:run -Dspring-boot.run.profiles=dev
spring.threads.virtual.enabled=true

# ===============================
# JPA COMMON
# ===============================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ===============================
# REDIS COMMON
# ===============================
spring.data.redis.timeout=2000
spring.data.redis.connect-timeout=1000

# ===============================
# ACTUATOR - GENERAL (baseline semua profile)
# ===============================

# PENTING: karena server.servlet.context-path=/api,
# Spring Boot 3.x memisahkan Actuator dari context-path aplikasi.
# Actuator harus diakses via path TANPA /api prefix:
#   → http://localhost:8080/actuator/health
#   → http://localhost:8080/actuator/prometheus
#
# Di prod: actuator berjalan di port 8082 (management.server.port=8082)
#   → http://spring_app:8082/internal/actuator/prometheus  (Prometheus scrape)

management.endpoints.web.base-path=/actuator

# Expose minimal secara default — setiap profile boleh tambah/kurangi
management.endpoints.web.exposure.include=health,info

# Jangan tampilkan detail health ke publik — di-override per profile
management.endpoint.health.show-details=never

# Aktifkan endpoint health secara eksplisit
management.endpoint.health.enabled=true

# Tag global — muncul di semua metric (micrometer)
management.metrics.tags.application=${spring.application.name}

# Info endpoint: tampilkan nama app & java version
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Info statis aplikasi (muncul di GET /actuator/info)
info.app.name=Todolist REST API
info.app.description=Spring Boot Monolith Todolist
info.app.version=1.0.0

# ===============================
# RESILIENCE4J DEFAULT
# ===============================
resilience4j.circuitbreaker.instances.default.register-health-indicator=true
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.mohammadnuridin.todolist.core.aspect=DEBUG
logging.level.mohammadnuridin.todolist.modules.auth=INFO
logging.level.mohammadnuridin.todolist.modules.user=INFO

# Format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File
logging.file.name=logs/app.log
logging.file.max-size=10MB

# ===============================
# MESSAGES
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

# ===============================
# JWT
# Nilai aktual didefinisikan per profile (dev/prod/test)
# JANGAN hardcode secret di sini — file ini masuk version control
# ===============================
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ===============================
# RATE LIMITER (Caffeine In-Memory)
# Default — bisa di-override per profile
# ===============================
app.rate-limiter.capacity=60
app.rate-limiter.refill-duration-seconds=60
app.rate-limiter.auth.capacity=10
app.rate-limiter.auth.refill-duration-seconds=60

# ===============================
# SECURITY HEADERS
# Default — bisa di-override per profile
# ===============================
app.security.headers.hsts-enabled=false
app.security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'

# ===============================
# FLYWAY
# ===============================
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8