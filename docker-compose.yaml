version: "3.8"

services:
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "asdf;lkj"
      MYSQL_DATABASE: todolist_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_volume:/var/lib/mysql
    networks:
      - todolist_network
    mem_limit: 768m
    mem_reservation: 512m
    cpus: "1.0"
    command: >
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --max-connections=50
      --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: todolist-api:latest
    container_name: spring_app
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:mysql://mysql_db:3306/todolist_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: "asdf;lkj"

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      JWT_SECRET_KEY: "your_super_long_random_secret_key_here"

      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - todolist_network
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"

volumes:
  mysql_volume:

networks:
  todolist_network:
    driver: bridge
